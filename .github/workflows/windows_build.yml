name: Build Kodys Windows Installer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Using a stable long-term version for CI reliability

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Compile Python to EXE (PyInstaller)
      run: |
        # We manually run the command from build_windows.bat but in a CI-friendly way
        pyinstaller --noconfirm --onedir --windowed --add-data "app_config;app_config" --add-data "kodys;kodys" application_code\run.py

    - name: Install Inno Setup
      run: choco install innosetup

    - name: Build Clinical Installer (Inno Setup)
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" application_code/kodys_inno_setup.iss

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kodys-Windows-Setup
        path: Output/*.exe # This captures the .exe generated by Inno Setup
