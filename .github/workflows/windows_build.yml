name: Build Kodys Windows Installer
run-name: Windows Build - ${{ github.event.head_commit.message }}

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        check-latest: true

    - name: Install System Dependencies
      run: choco install wkhtmltopdf

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip setuptools==69.0.3 wheel
        python -m pip install -r requirements.txt
        python -m pip install pyinstaller packaging
        # Diagnostic check to ensure pkg_resources is actually in the build environment
        python -c "import pkg_resources; print(f'Environment Check: pkg_resources found at {pkg_resources.__file__}')"

    - name: Clean Python Cache
      run: |
        Get-ChildItem -Path . -Include __pycache__ -Recurse | Remove-Item -Recurse -Force
        Get-ChildItem -Path . -Include *.pyc -Recurse | Remove-Item -Force
      shell: pwsh

    - name: Prepare wkhtmltopdf for Bundling
      shell: pwsh
      run: |
        mkdir wkhtmltopdf
        xcopy /E /I "C:\Program Files\wkhtmltopdf" wkhtmltopdf

    - name: Compile Python to EXE (PyInstaller)
      shell: pwsh
      run: |
        python -m PyInstaller --noconfirm --onedir --windowed --name "Kodys Foot Clinik" `
          --add-data "app_config;app_config" `
          --add-data "kodys;kodys" `
          --add-data "app_assets;app_assets" `
          --add-data "config;config" `
          --add-data "db.sqlite3;." `
          --add-data "wkhtmltopdf;wkhtmltopdf" `
          --hidden-import "PyQt5.QtWebEngineWidgets" `
          --hidden-import "PyQt5.QtPrintSupport" `
          --hidden-import "cv2" `
          --hidden-import "pywinusb.hid" `
          --hidden-import "setuptools" `
          --hidden-import "distutils" `
          --hidden-import "fitz" `
          --hidden-import "pymupdf" `
          --hidden-import "cryptography.fernet" `
          --hidden-import "cryptography.hazmat.backends" `
          --hidden-import "pkg_resources" `
          --hidden-import "heartpy" `
          --hidden-import "pyhrv" `
          --hidden-import "pyhrv.time_domain" `
          --hidden-import "pyhrv.frequency_domain" `
          --hidden-import "pyhrv.nonlinear" `
          --hidden-import "peakutils" `
          --hidden-import "scipy.signal" `
          --hidden-import "scipy.optimize" `
          --hidden-import "scipy.interpolate" `
          --hidden-import "scipy.stats" `
          --hidden-import "matplotlib" `
          --hidden-import "matplotlib.pyplot" `
          --hidden-import "pandas" `
          --hidden-import "serial" `
          --hidden-import "xlsxwriter" `
          --hidden-import "pdfkit" `
          --hidden-import "requests" `
          --hidden-import "psutil" `
          --hidden-import "django.contrib.admin" `
          --hidden-import "django.contrib.auth" `
          --hidden-import "django.contrib.contenttypes" `
          --hidden-import "django.contrib.sessions" `
          --hidden-import "django.contrib.messages" `
          --hidden-import "django.contrib.staticfiles" `
          --collect-all "heartpy" `
          --collect-all "pyhrv" `
          --collect-all "pkg_resources" `
          --collect-all "setuptools" `
          --copy-metadata "setuptools" `
          --copy-metadata "heartpy" `
          application_code\run.py

    - name: Run Bundle Sanity Audit (Pre-Installer Check)
      shell: pwsh
      run: |
        echo "Auditing compiled Windows bundle for clinical integrity..."
        # Force absolute path for the bundle root to avoid search ambiguity
        $env:BUNDLE_ROOT = Join-Path (Get-Location) "dist\Kodys Foot Clinik"
        $env:PYTHONPATH = "$env:BUNDLE_ROOT;application_code"
        
        echo "Bundle Root Set To: $env:BUNDLE_ROOT"
        echo "Listing root of dist to confirm engine existence:"
        ls dist
        
        echo "Listing bundle contents:"
        ls "$env:BUNDLE_ROOT"
        
        python application_code/sanity_check.py
        if ($LASTEXITCODE -ne 0) {
          echo "BUNDLE AUDIT FAILED: The built binary is missing critical modules or assets."
          exit 1
        }
        echo "BUNDLE AUDIT PASSED: All clinical assets verified."

    - name: Install Inno Setup
      run: choco install innosetup

    - name: Build Clinical Installer (Inno Setup)
      run: |
        mkdir Output
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" application_code/kodys_inno_setup.iss

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kodys-Windows-Setup
        path: Output/*.exe

    - name: Create Public Release Link
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        tag_name: latest
        files: Output/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
