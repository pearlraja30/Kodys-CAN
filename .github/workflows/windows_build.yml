name: Build Kodys Windows Installer
run-name: Windows Build - ${{ github.event.head_commit.message }}

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        check-latest: true

    - name: Install System Dependencies
      run: choco install wkhtmltopdf

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        python -m pip install pyinstaller packaging

    - name: Clean Python Cache
      run: |
        Get-ChildItem -Path . -Include __pycache__ -Recurse | Remove-Item -Recurse -Force
        Get-ChildItem -Path . -Include *.pyc -Recurse | Remove-Item -Force
      shell: pwsh

    - name: Compile Python to EXE (PyInstaller)
      shell: pwsh
      run: |
        python -m PyInstaller --noconfirm --onedir --windowed --name "Kodys Foot Clinik" `
          --add-data "app_config;app_config" `
          --add-data "kodys;kodys" `
          --add-data "app_assets;app_assets" `
          --add-data "config;config" `
          --add-data "db.sqlite3;." `
          --hidden-import "PyQt5.QtWebEngineWidgets" `
          --hidden-import "PyQt5.QtPrintSupport" `
          --hidden-import "cv2" `
          --hidden-import "pywinusb.hid" `
          --hidden-import "setuptools" `
          --hidden-import "distutils" `
          application_code\run.py

    - name: Install Inno Setup
      run: choco install innosetup

    - name: Build Clinical Installer (Inno Setup)
      run: |
        mkdir Output
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" application_code/kodys_inno_setup.iss

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kodys-Windows-Setup
        path: Output/*.exe

    - name: Create Public Release Link
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        tag_name: latest
        files: Output/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
