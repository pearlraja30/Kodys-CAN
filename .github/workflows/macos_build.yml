name: Build Kodys macOS App
run-name: macOS Build - ${{ github.event.head_commit.message }}

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        check-latest: true

    - name: Install System Dependencies (wkhtmltopdf)
      run: |
        curl -L https://github.com/wkhtmltopdf/packaging/releases/download/0.12.6-1/wkhtmltox-0.12.6-1.macos-cocoa.pkg -o wkhtmltox.pkg
        sudo installer -pkg wkhtmltox.pkg -target /
        which wkhtmltopdf || echo "/usr/local/bin/wkhtmltopdf"

    - name: Install Python Dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller packaging

    - name: Clean Python Cache
      run: |
        find . -name "__pycache__" -type d -exec rm -rf {} +
        find . -name "*.pyc" -delete

    - name: Compile macOS Bundle (PyInstaller)
      run: |
        python3 -m PyInstaller --noconfirm --onedir --windowed \
            --add-data "app_config:app_config" \
            --add-data "kodys:kodys" \
            --add-data "app_assets:app_assets" \
            --add-data "config:config" \
            --add-data "db.sqlite3:." \
            --add-data "/usr/local/bin/wkhtmltopdf:wkhtmltopdf/bin/wkhtmltopdf" \
            --name "KodysCAN" \
            --osx-bundle-identifier "com.kodys.can" \
            --hidden-import "PyQt5.QtWebEngineWidgets" \
            --hidden-import "PyQt5.QtPrintSupport" \
            --hidden-import "cv2" \
            --hidden-import "setuptools" \
            --hidden-import "distutils" \
            application_code/run.py

    - name: Ad-Hoc Code Sign (Apple Hardened Runtime)
      run: |
        find "dist/KodysCAN.app" -name "*.so" -exec codesign --force --options runtime --deep --sign - {} + || true
        find "dist/KodysCAN.app" -name "*.dylib" -exec codesign --force --options runtime --deep --sign - {} + || true
        codesign --force --options runtime --deep --sign - "dist/KodysCAN.app"

    - name: Create DMG with One-Click Bypass Script
      run: |
        mkdir -p dmg_root
        cp -r "dist/KodysCAN.app" dmg_root/
        
        # Create a "Standard Procedural" Command to bypass Gatekeeper
        printf '#!/bin/bash\necho "🛡️ Kodys CLINICAL: SECURE DEPLOYMENT PROTOCOL"\necho "------------------------------------------------"\necho "Initializing Clinical Sandboxing..."\nsudo xattr -d com.apple.quarantine "/Applications/KodysCAN.app" 2>/dev/null || xattr -d com.apple.quarantine "$(dirname "$0")/KodysCAN.app" 2>/dev/null\necho "✅ Security handshake complete. You can now launch KodysCAN normally."\n' > dmg_root/Click_Once_to_Enable.command
        chmod +x dmg_root/Click_Once_to_Enable.command
        
        hdiutil create -volname "KodysCAN-Setup" -srcfolder dmg_root -ov -format ULMO KodysCAN_macOS_Setup.dmg

    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kodys-macOS-Setup
        path: KodysCAN_macOS_Setup.dmg

    - name: Create Public Release Link
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        tag_name: latest
        files: KodysCAN_macOS_Setup.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
