name: Build Kodys macOS App
run-name: macOS Build - ${{ github.event.head_commit.message }}

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        check-latest: true

    - name: Install System Dependencies (wkhtmltopdf)
      run: |
        curl -L https://github.com/wkhtmltopdf/packaging/releases/download/0.12.6-1/wkhtmltox-0.12.6-1.macos-cocoa.pkg -o wkhtmltox.pkg
        sudo installer -pkg wkhtmltox.pkg -target /
        which wkhtmltopdf || echo "/usr/local/bin/wkhtmltopdf"

    - name: Install Python Dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt
        python3 -m pip install pyinstaller packaging

    - name: Clean Python Cache
      run: |
        find . -name "__pycache__" -type d -exec rm -rf {} +
        find . -name "*.pyc" -delete

    - name: Compile macOS Bundle (PyInstaller)
      run: |
        python3 -m PyInstaller --noconfirm --onedir --windowed \
            --add-data "app_config:app_config" \
            --add-data "kodys:kodys" \
            --add-data "app_assets:app_assets" \
            --add-data "config:config" \
            --add-data "db.sqlite3:." \
            --add-data "/usr/local/bin/wkhtmltopdf:wkhtmltopdf/bin/wkhtmltopdf" \
            --name "KodysCAN" \
            --osx-bundle-identifier "com.kodys.can" \
            --hidden-import "PyQt5.QtWebEngineWidgets" \
            --hidden-import "PyQt5.QtPrintSupport" \
            --hidden-import "cv2" \
            --hidden-import "setuptools" \
            --hidden-import "distutils" \
            --hidden-import "fitz" \
            --hidden-import "pymupdf" \
            --hidden-import "cryptography.fernet" \
            --hidden-import "cryptography.hazmat.backends" \
            application_code/run.py

    - name: Ad-Hoc Code Sign (Apple Hardened Runtime)
      run: |
        find "dist/KodysCAN.app" -name "*.so" -exec codesign --force --options runtime --deep --sign - {} + || true
        find "dist/KodysCAN.app" -name "*.dylib" -exec codesign --force --options runtime --deep --sign - {} + || true
        codesign --force --options runtime --deep --sign - "dist/KodysCAN.app"

    - name: Create DMG Setup
      run: |
        mkdir -p dmg_source
        cp -r "dist/KodysCAN.app" dmg_source/
        
        # Define the bypass script using a robust multi-line variable
        # This keeps the YAML structure clean and avoids heredoc indentation errors
        SCRIPT_CONTENT="#!/bin/bash
        clear
        echo \"🛡️ Kodys CLINICAL: SECURE DEPLOYMENT PROTOCOL\"
        echo \"------------------------------------------------\"
        echo \"Initializing Clinical Sandboxing & Cleaning Quarantine...\"
        
        APP_PATH=\"\$(dirname \"\$0\")/KodysCAN.app\"
        ALT_PATH=\"/Applications/KodysCAN.app\"
        
        if [ -d \"\$APP_PATH\" ]; then
            TARGET=\"\$APP_PATH\"
        elif [ -d \"\$ALT_PATH\" ]; then
            TARGET=\"\$ALT_PATH\"
        else
            echo \"❌ ERROR: KodysCAN.app not found. Please drag it to Applications first.\"
            read -p \"Press Enter to exit...\"
            exit 1
        fi
        
        echo \"Cleaning: \$TARGET\"
        sudo xattr -rd com.apple.quarantine \"\$TARGET\" 2>/dev/null
        
        echo \"✅ Security handshake complete.\"
        echo \"------------------------------------------------\"
        echo \"You can now launch KodysCAN normally.\"
        echo \"If still blocked, go to: System Settings -> Privacy & Security -> Open Anyway\"
        echo \"------------------------------------------------\"
        read -p \"Press Enter to finish...\""
        
        echo "$SCRIPT_CONTENT" > dmg_source/ENABLE_SECURITY.command
        # Clean up any potential YAML leading spaces from the generated file
        sed -i '' 's/^[[:space:]]*//' dmg_source/ENABLE_SECURITY.command
        # Restore the shebang at the top
        sed -i '' '1s/.*/#!\/bin\/bash/' dmg_source/ENABLE_SECURITY.command
        chmod +x dmg_source/ENABLE_SECURITY.command
        
        # Sync and safety buffer to prevent "Resource Busy"
        sync
        sleep 10
        
        hdiutil create -volname "KodysCAN-Setup" -srcfolder dmg_source -ov -format UDZO KodysCAN_macOS_Setup.dmg

    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kodys-macOS-Setup
        path: KodysCAN_macOS_Setup.dmg

    - name: Create Public Release Link
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        tag_name: latest
        files: KodysCAN_macOS_Setup.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
