name: Build Kodys macOS App
run-name: macOS Build - ${{ github.event.head_commit.message }}

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        check-latest: true

    - name: Install System Dependencies (wkhtmltopdf)
      run: |
        curl -L https://github.com/wkhtmltopdf/packaging/releases/download/0.12.6-1/wkhtmltox-0.12.6-1.macos-cocoa.pkg -o wkhtmltox.pkg
        sudo installer -pkg wkhtmltox.pkg -target /
        which wkhtmltopdf || echo "/usr/local/bin/wkhtmltopdf"

    - name: Install Python Dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller packaging

    - name: Clean Python Cache
      run: |
        find . -name "__pycache__" -type d -exec rm -rf {} +
        find . -name "*.pyc" -delete

    - name: Compile macOS Bundle (PyInstaller)
      run: |
        pyinstaller --noconfirm --onedir --windowed \
            --add-data "app_config:app_config" \
            --add-data "kodys:kodys" \
            --add-data "app_assets:app_assets" \
            --add-data "config:config" \
            --add-data "db.sqlite3:." \
            --exclude-module "tkinter" \
            --exclude-module "unittest" \
            --exclude-module "pydoc" \
            --exclude-module "setuptools" \
            --exclude-module "distutils" \
            --exclude-module "jedi" \
            --exclude-module "IPython" \
            --name "KodysCAN" \
            --hidden-import "PyQt5.QtWebEngineWidgets" \
            --hidden-import "PyQt5.QtPrintSupport" \
            --hidden-import "cv2" \
            application_code/run.py

    - name: Strip Binaries (macOS Slimming)
      run: |
        find "dist/KodysCAN.app" -name "*.so" -exec strip -x {} + || true

    - name: Create DMG Disk Image
      run: |
        mkdir -p dmg_root
        cp -r "dist/KodysCAN.app" dmg_root/
        hdiutil create -volname "KodysCAN-Setup" -srcfolder dmg_root -ov -format UDZO KodysCAN_macOS_Setup.dmg

    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kodys-macOS-Setup
        path: KodysCAN_macOS_Setup.dmg

    - name: Create Public Release Link
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        tag_name: latest
        files: KodysCAN_macOS_Setup.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
